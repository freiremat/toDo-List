<form [formGroup]="todosForm" (ngSubmit)="handleCreateNewtodo()">
  <section class="todo_form_card">
    <h1>Add Tarefa</h1>

    <!-- Nome -->
    <mat-form-field 
      color="accent"  
      appearance="outline"
      class="todo_form_input">
      <mat-label>Nome</mat-label>
      <input matInput formControlName="title" placeholder="Nome" />
    </mat-form-field>

    <!-- Descrição -->
    <mat-form-field 
      color="accent"  
      appearance="outline"
      class="todo_form_input">
      <mat-label>Descrição</mat-label>
      <textarea matInput formControlName="description" placeholder="Descrição"></textarea>
    </mat-form-field>

    <div class="todo_form_card_actions">
      <button mat-raised-button class="todo_form_success_btn" type="submit">Adicionar</button>

      <button mat-raised-button color="warn" type="button">Cancelar</button>
    </div>

  </section>
</form>
